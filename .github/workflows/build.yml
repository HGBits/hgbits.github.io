name: Deploy Site

on:
  push:
    branches: [main]

permissions:
  pages: write
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Show Input Structure
        run: |
          echo "=== RAIZ ==="
          ls -la
          echo "=== CONTENT ==="
          ls -R content/ 2>/dev/null || echo "content/ vazia"
          echo "=== TEMPLATES ==="
          ls -R templates/ 2>/dev/null || echo "templates/ vazia"
      
      - name: Build Site
        run: |
          python build.py
          echo "=== SAÍDA DO BUILD ==="
          ls -la
          ls -la posts/ 2>/dev/null || echo "ERRO: pasta posts não criada"
      
      - name: Ensure .nojekyll
        run: touch .nojekyll
      
      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
