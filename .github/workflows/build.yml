name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'build.py'
      - 'templates/**'
      - 'style.css'
      - 'effects.js'

permissions:
  pages: write
  contents: read
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Display structure
        run: ls -R
      
      - name: Build site
        run: |
          python build.py
          ls -la *.html posts/ 2>/dev/null || echo "No HTML files generated!"
      
      - name: Create .nojekyll
        run: touch .nojekyll
      
      - name: List artifacts
        run: ls -la
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
